        <div class="perfil">

            </div>

</body>

<script>

    function exibirAquarios() {
        
        var vt_favoritos = JSON.parse(sessionStorage.FAVORITOS);
        

        if (vt_favoritos.length == 0) {
        document.getElementById("cardFavoritos").innerHTML = "<p>Você ainda não favoritou nenhuma receita!</p>";
        return;
        }

        let i = 0;
        while (i < 3) {
            document.getElementById("cardFavoritos").innerHTML += `
                <a href="../receita${vt_favoritos[i].idRec}">
                    <div class="card-favorito">
                        <div class="title-favorito">
                            <h1>${vt_favoritos[i].nome}</h1>
                        </div>
                        <div class="desc-favorito">
                            <p>${vt_favoritos[i].descr}</p>
                        </div>
                    </div>
                    </div>
                </a>`
            i++
        }
    }

</script>
