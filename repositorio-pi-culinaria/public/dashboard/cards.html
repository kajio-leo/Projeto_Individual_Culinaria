</body>

<script>

    function exibirFavoritos() {
        document.getElementById("cardFavoritos").innerHTML = "";
        var vt_favoritos = JSON.parse(sessionStorage.FAVORITOS);
        

        if (vt_favoritos.length == 0) {
        document.getElementById("cardFavoritos").innerHTML = "<p>Você ainda não favoritou nenhuma receita!</p>";
        return;
        }

        let i = 0;
        while (i < 3 && i < vt_favoritos.length) {
            document.getElementById("cardFavoritos").innerHTML += `
                <a href="../receita${vt_favoritos[i].idRec}">
                    <div class="card-favorito">
                        <div class="title-favorito">
                            <h1>${vt_favoritos[i].nome}</h1>
                        </div>
                        <div class="desc-favorito">
                            <p>${vt_favoritos[i].descr}</p>
                        </div>
                    </div>
                    </div>
                </a>`
            i++
        }
    }

    function obterKpi1() {
        var idUser = sessionStorage.getItem("ID_USUARIO");

        fetch(`/kpis/buscar-kpi1/${idUser}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (respostaKpi1) {
                    console.log(`Dados recebidos: ${JSON.stringify(respostaKpi1)}`);
                    respostaKpi1.reverse();

                    plotarKpi1(respostaKpi1, idUser);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ kpi1: ${error.message}`);
            });
    }

    function plotarKpi1(respostaKpi1, idUser) {
        console.log('iniciando plotagem da kpi1');
        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterKpi1" e passados para "plotarKpi1":')
        console.log(respostaKpi1)
        let porcentagem = ((Number(respostaKpi1[0].qtdIgual) / Number(respostaKpi1[0].qtdTotal)) * 100).toFixed();
        let contrario = '';

        if (respostaKpi1[0].opcao == 'Doce') {
            contrario = 'Salgado'
        } else if (respostaKpi1[0].opcao == 'Salgado') {
            contrario = 'Doce'
        }


        document.getElementById("kpi1-opc").innerHTML = respostaKpi1[0].opcao
        document.getElementById("kpi1-porc").innerHTML = `${porcentagem}%`
        document.getElementById("kpi1-text").innerHTML = `Você faz parte dos ${porcentagem}% que prefere ${respostaKpi1[0].opcao} a ${contrario}`

    }

    function obterKpi2() {
        var idUser = sessionStorage.getItem("ID_USUARIO");

        fetch(`/kpis/buscar-kpi2/${idUser}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (respostaKpi2) {
                    console.log(`Dados recebidos: ${JSON.stringify(respostaKpi2)}`);
                    respostaKpi2.reverse();

                    plotarKpi2(respostaKpi2, idUser);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ kpi2: ${error.message}`);
            });
    }

    function plotarKpi2(respostaKpi2, idUser) {
        console.log('iniciando plotagem da kpi2');
        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterKpi2" e passados para "plotarKpi2":')
        console.log(respostaKpi2)
        let vt_favoritos = JSON.parse(sessionStorage.getItem("FAVORITOS"));
        let porcentagem = ((Number(respostaKpi2[0].qtdUser) / Number(respostaKpi2[0].qtdUserTot)) * 100).toFixed();
        let receita = '';

        for (let i = 0; i < vt_favoritos.length; i++) {
            if (vt_favoritos[i].idRec == respostaKpi2[0].menosPopular) {
                receita = vt_favoritos[i].nome
            }
        }

        document.getElementById("kpi2-text1").innerHTML = 'A receita que você salvou menos popular é:'
        document.getElementById("kpi2-nome").innerHTML = `${receita}`
        document.getElementById("kpi2-text2").innerHTML = `De todos os usuários somente ${porcentagem}% favoritou ela e você faz parte disso`




    }


    function obterGrafico1() {

        fetch(`/kpis/buscar-graf1`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (respostaGraf1) {
                    console.log(`Dados recebidos: ${JSON.stringify(respostaGraf1)}`);

                    plotarGraf1(respostaGraf1);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico1: ${error.message}`);
            });
    }

    function plotarGrafico1(respostaGraf1){
        var numeroFavoritas = [];
        var receitas = [];

        // Preenchendo os arrays com os dados
        for(var i = 0; i < respostaGraf1.length; i++){
            qtdFavs.push(respostaGraf1[i].qtdFav);
            receitas.push(respostaGraf1[i].nome);
        }

        // Capturando o elemento canvas pelo id 
        var ctx = document.getElementById('barra').getContext('2d');
        // Criando o gráfico de barra usando o Chart.js
        var myChart = new Chart(ctx, {
            type: 'bar', // Tipo de gráfico: barra
            data: { // Dados para o gráfico
                labels: receitas, // Rótulos no eixo X
                datasets: [{

                    y: {

    function obterGrafico2() {

        fetch(`/kpis/buscar-graf2`, { cache: 'no-store' }).then(function (response) {

                    respostaGraf2.reverse();

                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico2: ${error.message}`);
            });
    }

    function plotarGrafico2(respostaGraf2){
        var numeroFavoritas = [];
        var receitas = [];

        // Preenchendo os arrays com os dados
        for(var i = 0; i < respostaGraf2.length; i++){
            numeroFavoritas.push(respostaGraf2[i].qtdFav);
            receitas.push(respostaGraf2[i].nome);
        }

        // Capturando o elemento canvas pelo id 
        var ctx = document.getElementById('barra').getContext('2d');
        // Criando o gráfico de barra usando o Chart.js
        var myChart = new Chart(ctx, {
            type: 'bar', // Tipo de gráfico: barra
            data: { // Dados para o gráfico
                labels: receitas, // Rótulos no eixo X
                datasets: [{
                    label: 'Favoritados', // Nome do conjunto de dados
                    data: numeroFavoritas, // Dados dos votos
                    backgroundColor: [
                        '#c62020', // Cor de fundo das barras
                    ],
                    borderColor: [
                        '#981313', // Cor da borda das barras
                    ],
                    borderWidth: 1 // Largura da borda das barras
                }]
            },
            options: {
                responsive: false,
                maintainAspectRatio: false,
                hover : {
                    mode: null
                },
                plugins: {
                    legend: {

                            font: {
                                family: 'Poppins',
                                size: 14,
                                weight: 'bold'
                            },
                            color: '#111111'
                        }
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {

                        }
                    },
                    y: {

    }

    function verFavoritadosUser() {
        let idUsuario = sessionStorage.getItem("ID_USUARIO") 

        fetch(`/favoritos/buscarFavoritadosPorUsuario/${idUsuario}`)
        .then(function (resposta) {
            if (resposta.ok) {
                resposta.json().then(function (respostaFav) {
                    console.log(`Dados recebidos: ${JSON.stringify(respostaFav)}`);
                    sessionStorage.FAVORITOS = JSON.stringify(respostaFav)
                    exibirFavoritos()
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico2: ${error.message}`);
            });
    }

    function deletar() {
        let idUser = sessionStorage.getItem("ID_USUARIO");

        let resposta = prompt(`Ao refazer o quiz as suas respostas anteriores serão apagadas, tem certeza que quer refazer? Digite 'sim' para confirmar`)
        resposta = resposta.trim().toUpperCase()

        if (resposta == 'SIM') {
            console.log("Criar função de apagar respostas do quizz - ID" + idUser);
            fetch(`/quizzes/deletar/${idUser}`, {
                method: "DELETE",
                headers: {
                    "Content-Type": "application/json"
                }
            }).then(function (resposta) {

                if (resposta.ok) {
                    window.location = "../quiz.html"
                } else if (resposta.status == 404) {
                    window.alert("Deu 404!");
                } else {
                    throw ("Houve um erro ao tentar realizar a postagem! Código da resposta: " + resposta.status);
                }
            }).catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
        }   
    }

    function respondeu() {
        let idUser = sessionStorage.getItem("ID_USUARIO")
        fetch("/quizzes/temnobanco", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            id: idUser
                        })
                    })
                    .then(r => r.json())
                    .then(resultadoAutenticar => {
                        if (resultadoAutenticar.tem) {
                            window.location = "#"
                        } else {
                            window.location = "../quiz.html"
                        }
                    })
    }

</script>
