<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Comp. Cozinheiros | Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css">
    <link rel="icon" href="./assets/icon/icon.png">
    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body onload="entrou(); logado()">

   
    <div class="alerta_erro">
                    <div class="card_erro" id="cardErro">
                        <span id="mensagem_erro"></span>
                    </div>
                </div>
    <!--Header-->
    <div class="header">
        <div class="container">
            <h1 class="titulo">
                <a href="index.html">Companheiros Cozinheiros</a>
            </h1>
            <ul class="navbar">
                <li>
                    <a href="receitas.html">Receitas</a>
                </li>
                <li>
                    <a href="sobre.html">Sobre</a>
                </li>
                <li class="agora">
                    <a id="login" href="#">Login</a>
                </li>
            </ul>
        </div>
    </div>


    <div class="login">
        <div class="bodyLogin">
            <div class="bannerLogin">
                <div class="imagem">
                    <img src="assets/imgs/friends-home-having-lunch.jpg" alt="">
                </div>
            </div>
            <div class="container">
                <div class="card card-login">
                    <h2>Que bom ter você de volta!</h2>
                    <div class="formulario">
                        <div class="campo">
                            <span>E-mail:</span>
                            <input id="email_input" type="text" placeholder="Email">
                        </div>
                        <div class="campo">
                            <span>Senha:</span>
                            <input id="senha_input" type="password" placeholder="Senha">
                        </div>
                        <div class="cadastrin">Ainda não possui uma conta? <a href="cadastro.html">Cadastre-se</a></div>
                        <button class="botao" onclick="entrar()">Entrar</button>
                    </div>

                    <div id="div_aguardar" class="loading-div">
                        <img src="./assets/circle-loading.gif" id="loading-gif">
                    </div>

                    <div id="div_erros_login"></div>
                </div>
            </div>
        </div>
    </div>

    <!--footer inicio-->
    <div class="footer">
        <div class="container">
            <h4>Feito com carinho &hearts; por um aluno SPTech &copy; 2026</h4>
        </div>
    </div>
    <!--footer fim-->

</body>

</html>

<script>

    function entrou() {
        if (sessionStorage.ID_USUARIO != undefined) {
            document.getElementById("login").innerHTML = "Perfil"
        }
    }

    function logado() {
        if (sessionStorage.ID_USUARIO != undefined) {
            window.location = "./dashboard/cards.html"
        }
    }


    function entrar() {
        aguardar();

        var emailVar = email_input.value.trim();
        var senhaVar = senha_input.value.trim();
        let temArroba = false;
        let i = 0;

        while (i < emailVar.length) {
            if (emailVar[i] == '@') {
                temArroba = true
            }
            i++
        }
        if (!temArroba) {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "E-mail inválido, todo e-mail tem um @";
            finalizarAguardar();
            setTimeout(() => {
                cardErro.style.display = "none"
            }, 4000)
            return false;
        }

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "Insira um e-mail e senha para entrar!";
            finalizarAguardar();
            setTimeout(() => {
                cardErro.style.display = "none"
            }, 4000)
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.FAVORITOS = JSON.stringify(json.favoritos);

                    fetch("/quizzes/temnobanco", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            id: json.id
                        })
                    })
                    .then(r => r.json())
                    .then(resultadoAutenticar => {
                        if (resultadoAutenticar.tem) {
                            window.location = "./dashboard/cards.html"
                        } else {
                            window.location = "quiz.html"
                        }
})

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
